name: Build And Publish Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g., v2.9+26.1)"
        required: true
        type: string
      name:
        description: "Release name"
        required: true
        type: string
      body:
        description: "Changelog / release notes"
        required: false
        type: string
        default: ""
      game_versions:
        description: "Minecraft versions on Modrinth/CurseForge"
        required: true
        default: "26.1"
        type: choice
        options:
          - "26.1"
          - "26.1.x"
      prerelease:
        description: "Mark as prerelease?"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Mod
        run: ./gradlew build --no-daemon

      - name: List Build Outputs
        run: ls -la build/libs

      - name: Read Minecraft version from gradle.properties
        id: mc
        run: |
          mc_version=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$mc_version" >> "$GITHUB_OUTPUT"

      - name: Locate Release Jar
        id: jar
        run: |
          jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' | head -n 1)"
          if [ -z "$jar_path" ]; then
            echo "No release jar found in build/libs" >&2
            exit 1
          fi
          jar_name="$(basename "$jar_path")"
          echo "jar_path=$jar_path" >> "$GITHUB_OUTPUT"
          echo "jar_name=$jar_name" >> "$GITHUB_OUTPUT"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jailmod-jar
          path: ${{ steps.jar.outputs.jar_path }}
          if-no-files-found: error

      - name: Publish to GitHub, Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # GitHub Releases
          github-tag: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-generate-changelog: false
          github-prerelease: ${{ github.event.release.prerelease || github.event.inputs.prerelease || false }}

          # Modrinth
          modrinth-id: ZJf231gD
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: true

          # CurseForge
          curseforge-id: 1549513
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-name: ${{ steps.jar.outputs.jar_name }}

          # Shared metadata
          name: ${{ github.event.release.name || github.event.inputs.name || github.ref_name }}
          version: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
          changelog: ${{ github.event.release.body || github.event.inputs.body || '' }}
          loaders: fabric
          game-versions: ${{ github.event.inputs.game_versions || steps.mc.outputs.version }}
          java: 25

          files: ${{ steps.jar.outputs.jar_path }}

          dependencies: |
            fabric@*(required){modrinth:P7dR8mSH}{curseforge:306612}
            mod@*(optional){modrinth:Wpqg0ciI}
