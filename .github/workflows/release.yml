name: Build And Upload Release Jar

on:
  release:
    types:
      - published
      - prereleased
      - released
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Mod
        run: ./gradlew build --no-daemon

      - name: List Build Outputs
        run: ls -la build/libs

      - name: Locate Release Jar
        id: jar
        run: |
          jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' | head -n 1)"
          if [ -z "$jar_path" ]; then
            echo "No release jar found in build/libs" >&2
            exit 1
          fi
          jar_name="$(basename "$jar_path")"
          echo "jar_path=$jar_path" >> "$GITHUB_OUTPUT"
          echo "jar_name=$jar_name" >> "$GITHUB_OUTPUT"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jailmod-jar
          path: ${{ steps.jar.outputs.jar_path }}
          if-no-files-found: error

      - name: Upload Jar To Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          name: ${{ github.event.release.name || github.ref_name }}
          files: ${{ steps.jar.outputs.jar_path }}
          fail_on_unmatched_files: true
